<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BBH+Sans+Bartle&family=Space+Grotesk:wght@300..700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Anypage is an AI-powered code vulnerability analysis platform that helps developers detect, fix and test security issues faster.">


    <title>anypage</title>
  </head>
  <body style="margin:0;background:#f5f7fb;color:#172033;">
    <div id="root" style="height:100vh;overflow:hidden;"></div>
    <script>
      (function () {
        try {
          localStorage.setItem('theme', 'light');
          document.documentElement.classList.remove('dark');
          // 可选：同步浏览器 UI 颜色
          document.documentElement.style.colorScheme = 'light';
        } catch (_) {}
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
