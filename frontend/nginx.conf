server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;

    # 反代 /api/* → backend
    location /api/ {
        proxy_pass http://backend:7778/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket for socket.io multiplayer
    location /socket.io/ {
        proxy_pass http://backend:7778/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Vite hashed assets should 404 when stale, not fall back to index.html.
    location /assets/ {
        try_files $uri @asset_missing;
    }

    location @asset_missing {
        add_header Cache-Control "no-store";
        default_type application/javascript;
        return 404 "/* missing asset */";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
